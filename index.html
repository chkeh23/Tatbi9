<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>👽 Alien Musk Quantum Mining v6.5</title>
    
    <!-- Telegram WebApp SDK -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-auth-compat.js"></script>
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* =========================================== */
        /* 👽 ALIEN MUSK QUANTUM PLATFORM v6.5 */
        /* كامل مع جميع التعديلات - الجزء الأول */
        /* =========================================== */
        
        /* RESET & BASE */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        :root {
            /* ألوان Alien Quantum */
            --quantum-green: #00ff88;
            --quantum-blue: #00d4ff;
            --quantum-purple: #9d4edd;
            --quantum-pink: #ff0080;
            --quantum-gold: #ffd700;
            --quantum-cyan: #00ffff;
            --quantum-orange: #ff9900;
            --quantum-red: #ff4444;
            
            /* ألوان الخلفية */
            --space-dark: #0a0a0f;
            --space-darker: #050510;
            --space-card: #1a1a2e;
            --space-card-light: #2a2a4a;
            
            /* ألوان النص */
            --quantum-text: #ffffff;
            --quantum-text-light: #b0b0d0;
            --quantum-text-muted: #8080a0;
            
            /* ألوان الحالات */
            --status-pending: #ff9900;
            --status-approved: #00ff88;
            --status-rejected: #ff4444;
            --status-processing: #00d4ff;
            --status-completed: #00ff88;
            
            /* متدرجات */
            --gradient-quantum: linear-gradient(135deg, var(--quantum-green), var(--quantum-blue));
            --gradient-stellar: linear-gradient(135deg, var(--quantum-purple), var(--quantum-pink));
            --gradient-supernova: linear-gradient(135deg, var(--quantum-gold), #ff9900);
            --gradient-space: linear-gradient(145deg, var(--space-card), #16213e);
            --gradient-orange: linear-gradient(135deg, var(--quantum-orange), #ff5500);
        }
        
        /* BASE STYLES */
        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
            background: var(--space-dark);
            color: var(--quantum-text);
            font-size: 15px;
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            overscroll-behavior: none;
            padding-bottom: 80px;
        }
        
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(0, 212, 255, 0.05) 0%, transparent 50%),
                radial-gradient(circle at 40% 80%, rgba(157, 78, 221, 0.05) 0%, transparent 50%);
            pointer-events: none;
            z-index: -1;
        }
        
        /* LOADING SCREEN */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--space-darker);
            z-index: 99999;
            display: flex;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }
        
        .loading-container {
            text-align: center;
            padding: 30px;
            max-width: 360px;
            width: 90%;
            animation: quantumFadeIn 0.3s ease;
        }
        
        @keyframes quantumFadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .alien-logo {
            font-size: 56px;
            margin-bottom: 20px;
            animation: quantumFloat 3s ease-in-out infinite;
            filter: drop-shadow(0 0 20px rgba(0, 255, 136, 0.5));
            color: var(--quantum-green);
        }
        
        @keyframes quantumFloat {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-12px) rotate(-3deg); }
            75% { transform: translateY(-8px) rotate(3deg); }
        }
        
        .loading-title {
            font-size: 28px;
            font-weight: 800;
            background: var(--gradient-quantum);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 10px;
            letter-spacing: 1px;
            animation: quantumPulse 2s ease-in-out infinite;
        }
        
        @keyframes quantumPulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.8; }
        }
        
        .loading-subtitle {
            font-size: 17px;
            color: var(--quantum-text-light);
            margin-bottom: 30px;
            font-weight: 300;
        }
        
        .loading-progress {
            margin-top: 30px;
            width: 100%;
        }
        
        .progress-bar {
            height: 6px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            overflow: hidden;
            margin-bottom: 15px;
        }
        
        #loading-progress-bar {
            height: 100%;
            width: 25%;
            background: var(--gradient-quantum);
            border-radius: 50px;
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }
        
        #loading-progress-bar::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            animation: quantumShimmer 2s infinite;
        }
        
        @keyframes quantumShimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        #loading-progress-text {
            font-size: 13px;
            color: var(--quantum-text-muted);
            display: block;
            text-align: center;
        }
        
        /* APP CONTAINER */
        #app-container {
            min-height: 100vh;
            position: relative;
        }
        
        #app-container.hidden {
            display: none;
        }
        
        /* HEADER - COMPACT DESIGN */
        .app-header {
            background: rgba(26, 26, 46, 0.98);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(0, 255, 136, 0.2);
            padding: 8px 12px;
            position: sticky;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            min-height: 52px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
            animation: quantumSlideDown 0.3s ease;
        }
        
        @keyframes quantumSlideDown {
            from { opacity: 0; transform: translateY(-15px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .header-left {
            display: flex;
            align-items: center;
            gap: 8px;
            flex: 1;
            min-width: 0;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 6px 10px;
            background: rgba(0, 255, 136, 0.1);
            border-radius: 10px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            transition: all 0.2s;
            cursor: pointer;
            min-width: 0;
            flex-shrink: 1;
        }
        
        .logo:hover {
            background: rgba(0, 255, 136, 0.2);
            border-color: var(--quantum-green);
            transform: translateY(-1px);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
        }
        
        .logo i {
            font-size: 16px;
            color: var(--quantum-green);
            flex-shrink: 0;
        }
        
        .logo span {
            font-size: 15px;
            font-weight: 700;
            color: var(--quantum-text);
            letter-spacing: 0.5px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            flex-shrink: 1;
            min-width: 0;
        }
        
        .user-info-mini {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(255, 255, 255, 0.05);
            padding: 5px 8px;
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            min-width: 0;
            transition: all 0.2s;
            flex-shrink: 1;
        }
        
        .user-info-mini:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(255, 255, 255, 0.15);
        }
        
        .user-avatar-mini {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid var(--quantum-green);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            flex-shrink: 0;
        }
        
        .user-details-mini {
            display: flex;
            flex-direction: column;
            gap: 2px;
            min-width: 0;
            flex-shrink: 1;
        }
        
        .username-mini {
            font-size: 13px;
            font-weight: 600;
            color: var(--quantum-text);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 80px;
        }
        
        .user-id-mini {
            font-size: 10px;
            color: var(--quantum-text-muted);
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        
        .header-right {
            display: flex;
            align-items: center;
            flex-shrink: 0;
            gap: 8px;
        }
        
        .total-balance-header {
            background: rgba(0, 212, 255, 0.1);
            padding: 6px 10px;
            border-radius: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            transition: all 0.2s;
            min-width: 0;
        }
        
        .total-balance-header:hover {
            background: rgba(0, 212, 255, 0.15);
            border-color: var(--quantum-blue);
            box-shadow: 0 0 15px rgba(0, 212, 255, 0.4);
        }
        
        .balance-amount-header {
            display: flex;
            align-items: center;
            gap: 5px;
            margin-bottom: 2px;
        }
        
        .balance-amount-header i {
            font-size: 12px;
            color: var(--quantum-blue);
        }
        
        .balance-amount-header span:first-of-type {
            font-size: 15px;
            font-weight: 700;
            color: var(--quantum-text);
            font-family: monospace;
            white-space: nowrap;
        }
        
        .balance-amount-header .currency {
            font-size: 12px;
            color: var(--quantum-text-light);
            font-weight: 600;
        }
        
        .balance-usd-header {
            font-size: 10px;
            color: var(--quantum-text-muted);
            text-align: left;
        }
        
        /* NAVIGATION - MOVED TO BOTTOM */
        .main-nav {
            display: flex;
            background: rgba(26, 26, 46, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 18px;
            margin: 8px 12px;
            padding: 4px;
            gap: 2px;
            box-shadow: 0 -4px 25px rgba(0, 0, 0, 0.7);
            position: fixed;
            bottom: 8px;
            left: 12px;
            right: 12px;
            z-index: 1000;
            border: 1px solid rgba(255, 255, 255, 0.15);
            animation: quantumFadeInUp 0.3s ease;
        }
        
        @keyframes quantumFadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .nav-btn {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 8px 3px;
            background: transparent;
            border: none;
            border-radius: 12px;
            color: var(--quantum-text-light);
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
            position: relative;
            overflow: hidden;
        }
        
        .nav-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--gradient-quantum);
            opacity: 0;
            transition: opacity 0.2s;
        }
        
        .nav-btn i {
            font-size: 17px;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
        }
        
        .nav-btn span {
            font-size: 10px;
            font-weight: 600;
            transition: all 0.2s;
            position: relative;
            z-index: 2;
            letter-spacing: 0.5px;
        }
        
        .nav-btn.active {
            color: white;
            background: var(--gradient-quantum);
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            transform: translateY(-2px);
        }
        
        .nav-btn.active::before {
            opacity: 1;
        }
        
        .nav-btn.active i {
            transform: scale(1.1);
            color: white;
        }
        
        .nav-btn.active span {
            color: white;
            font-weight: 700;
        }
        
        .nav-btn:not(.active):hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--quantum-text);
        }
        
        .nav-btn:not(.active):hover i {
            color: var(--quantum-green);
        }
        
        /* PAGES */
        .page {
            display: none;
            padding: 12px;
            animation: quantumPageFadeIn 0.3s ease;
        }
        
        .page.active {
            display: block;
        }
        
        @keyframes quantumPageFadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        /* MINING SECTION */
        .mining-section {
            background: var(--gradient-space);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .mining-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--gradient-quantum);
            border-radius: 16px 16px 0 0;
        }
        
        .mining-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            padding-bottom: 10px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .mining-header h3 {
            font-size: 16px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--quantum-text);
        }
        
        .mining-header h3 i {
            color: var(--quantum-green);
            font-size: 17px;
            animation: quantumPulse 2s ease-in-out infinite;
        }
        
        .mining-stats {
            display: flex;
            gap: 12px;
        }
        
        .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border: 1px solid rgba(0, 255, 136, 0.15);
        }
        
        .stat-label {
            font-size: 10px;
            color: var(--quantum-text-light);
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        
        .stat-value {
            font-size: 16px;
            font-weight: 800;
            color: var(--quantum-green);
            font-family: monospace;
            letter-spacing: 0.5px;
        }
        
        .mining-timer-card {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 18px;
            text-align: center;
            border: 1px solid rgba(0, 255, 136, 0.12);
            position: relative;
            overflow: hidden;
        }
        
        .mining-timer-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(0, 255, 136, 0.4), transparent);
            animation: quantumShimmerBg 1.8s infinite linear;
        }
        
        @keyframes quantumShimmerBg {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .timer-display {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
        }
        
        .timer-display i {
            font-size: 18px;
            color: var(--quantum-green);
            animation: quantumSpin 20s infinite linear;
        }
        
        @keyframes quantumSpin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .timer-display span {
            font-size: 18px;
            font-weight: 800;
            font-family: monospace;
            color: var(--quantum-text);
            letter-spacing: 1.5px;
            text-shadow: 0 0 6px rgba(0, 255, 136, 0.5);
        }
        
        .next-reward {
            font-size: 13px;
            color: var(--quantum-text-light);
            position: relative;
            z-index: 1;
        }
        
        .next-reward span {
            color: var(--quantum-green);
            font-weight: 700;
            font-size: 15px;
        }
        
        .mining-action-btn {
            width: 100%;
            padding: 16px;
            background: var(--gradient-quantum);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 16px;
            font-weight: 700;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: all 0.2s;
            margin-bottom: 18px;
            box-shadow: 0 0 15px rgba(0, 255, 136, 0.4);
            position: relative;
            overflow: hidden;
        }
        
        .mining-action-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: linear-gradient(45deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            animation: quantumButtonShimmer 2s infinite;
        }
        
        @keyframes quantumButtonShimmer {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }
        
        .mining-action-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(0, 255, 136, 0.4);
        }
        
        .mining-action-btn:active {
            transform: translateY(0);
        }
        
        .mining-action-btn.claim-mode {
            background: var(--gradient-stellar);
            box-shadow: 0 0 15px rgba(157, 78, 221, 0.4);
        }
        
        .mining-action-btn.claim-mode::before {
            animation: quantumButtonShimmer 1.5s infinite;
        }
        
        .mining-info {
            display: flex;
            justify-content: space-around;
            gap: 8px;
            flex-wrap: wrap;
        }
        
        .info-item {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 13px;
            color: var(--quantum-text-light);
            padding: 8px 10px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 8px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            flex: 1;
            min-width: 130px;
            transition: all 0.2s;
        }
        
        .info-item:hover {
            background: rgba(255, 255, 255, 0.08);
            border-color: rgba(0, 255, 136, 0.2);
        }
        
        .info-item i {
            font-size: 15px;
            color: var(--quantum-green);
            width: 18px;
            text-align: center;
        }
        
        .info-item span span {
            color: var(--quantum-text);
            font-weight: 700;
            font-family: monospace;
        }
        
        /* الأزرار الجديدة تحت معلومات التعدين */
        .mining-quick-actions {
            display: flex;
            gap: 10px;
            margin: 15px 0 5px;
        }
        
        .quick-action-btn {
            flex: 1;
            background: linear-gradient(145deg, #1e1e35, #15152a);
            border: 1px solid rgba(0, 212, 255, 0.3);
            border-radius: 12px;
            padding: 12px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            transition: all 0.2s;
            color: var(--quantum-text);
        }
        
        .quick-action-btn:hover {
            border-color: var(--quantum-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 212, 255, 0.2);
        }
        
        .quick-action-btn i {
            font-size: 20px;
            color: var(--quantum-blue);
        }
        
        .quick-action-btn .quick-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .quick-action-btn .quick-sub {
            font-size: 10px;
            color: var(--quantum-text-light);
        }
        
        /* ===== UPGRADE SECTION ===== */
        .upgrade-section {
            background: var(--gradient-space);
            border-radius: 16px;
            padding: 18px;
            margin-bottom: 15px;
            border: 1px solid rgba(0, 255, 136, 0.2);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.6);
            position: relative;
            overflow: hidden;
        }
        
        .upgrade-section::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(135deg, var(--quantum-blue), var(--quantum-green));
            border-radius: 16px 16px 0 0;
        }
        
        .upgrade-section h4 {
            font-size: 16px;
            margin-bottom: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
            color: var(--quantum-text);
        }
        
        .upgrade-section h4 i {
            color: var(--quantum-blue);
            font-size: 17px;
        }
        
        .upgrade-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(190px, 1fr));
            gap: 12px;
        }
        
        .upgrade-card {
            background: linear-gradient(145deg, var(--space-card-light), #2a2a5a);
            border-radius: 12px;
            padding: 14px;
            border: 1px solid rgba(0, 212, 255, 0.2);
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }
        
        .upgrade-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;

        // دالة عرض الإشعارات الموحدة - نسخة احترافية
        function showNotification(message, type = 'info', duration = 3000) {
            const container = document.getElementById('notification-container');
            if (!container) return;
            
            // تحديد المدة حسب النوع
            const durations = {
                'success': 3000,
                'error': 3500,
                'warning': 4500,
                'info': 3000,
                'motivational': 6000
            };
            
            const finalDuration = durations[type] || duration;
            
            const messageId = 'notif_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const messageDiv = document.createElement('div');
            messageDiv.id = messageId;
            messageDiv.className = `message ${type}`;
            
            // تحديد الأيقونة حسب النوع
            const icons = {
                'success': 'fa-check-circle',
                'error': 'fa-times-circle',
                'warning': 'fa-exclamation-triangle',
                'info': 'fa-info-circle',
                'motivational': 'fa-rocket'
            };
            
            const icon = icons[type] || 'fa-bell';
            
            // تنسيق النص (للرسائل الطويلة)
            const formattedText = type === 'motivational' ? message.replace(/\n/g, '<br>') : message;
            
            messageDiv.innerHTML = `
                <i class="fas ${icon}"></i>
                <div style="flex: 1; ${type === 'motivational' ? 'font-size: 11px; line-height: 1.4;' : ''}">${formattedText}</div>
            `;
            
            container.appendChild(messageDiv);
            
            // إظهار الرسالة مع تأثير
            setTimeout(() => {
                messageDiv.style.opacity = '1';
                messageDiv.style.transform = 'translateX(-50%) translateY(0)';
            }, 10);
            
            // إخفاء الرسالة بعد المدة المحددة
            setTimeout(() => {
                messageDiv.style.opacity = '0';
                messageDiv.style.transform = 'translateX(-50%) translateY(-20px)';
                setTimeout(() => {
                    if (messageDiv.parentNode) messageDiv.remove();
                }, 300);
            }, finalDuration);
        }

        // دالة مساعدة لتنسيق الرسائل مع المتغيرات
        function formatMessage(template, variables = {}) {
            let message = template;
            for (const [key, value] of Object.entries(variables)) {
                message = message.replace(`{${key}}`, value);
            }
            return message;
        }

            const template = MESSAGES.success[key] || key;

        }

            const template = MESSAGES.error[key] || key;
            showNotification(formatMessage(template, vars), 'error');
        }

        function showWarning(key, vars = {}) {

            showNotification(formatMessage(template, vars), 'warning');

        async function claimUpgradeAchievement(level) {
            try {
                if (!walletData.achievements || !walletData.achievements.upgradeTasks[level]) {
                    showError('achievement_failed');
                    return;
                }
                
                const achievement = walletData.achievements.upgradeTasks[level];
                
                if (achievement.claimed) {
                    showWarning('already_claimed');
                    return;
                }
                
                if (!achievement.completed) {
                    showWarning('not_completed');
                    return;
                }
                
                const reward = CONFIG.ACHIEVEMENTS.UPGRADE[level];
                walletData.balances.AMSK += reward;
                walletData.achievements.upgradeTasks[level].claimed = true;
                
                addTransactionToHistory('achievement_reward', reward, 'AMSK', `Upgrade to Level ${level}`, 'completed', 'Achievement reward claimed');
                
                updateAchievementsDisplay();
                updateWalletUI();
                await saveUserData();
                
                showSuccess('achievement_claim', { amount: reward.toLocaleString(), name: `reaching Level ${level}` });
                
            } catch (error) {
                console.error('Error claiming upgrade achievement:', error);
                showError('achievement_failed');
            }
        }

        async function loadUserDataFromFirebase() {
            console.log("🔥 Loading user data from Firebase...");
            
            try {
                if (!window.db || !userData.id) {
                    console.log("⚠️ Firebase or user ID not available, using localStorage");
                    await loadUserFromLocalStorage();
                    return;
                }
                
                const userDoc = await window.db.collection(DB_COLLECTIONS.USERS)
                    .doc(userData.id)
                    .get();
                
                if (userDoc.exists) {
                    const firebaseData = userDoc.data();
                    
                    if (firebaseData.balances) walletData.balances = firebaseData.balances;
                    if (firebaseData.mining) walletData.mining = firebaseData.mining;
                    if (firebaseData.staking) walletData.staking = firebaseData.staking;
                    if (firebaseData.referrals) walletData.referrals = firebaseData.referrals;
                    if (firebaseData.tasks) walletData.tasks = firebaseData.tasks;
                    if (firebaseData.achievements) walletData.achievements = firebaseData.achievements;
                    if (firebaseData.transactions) walletData.transactions = firebaseData.transactions;
                    if (firebaseData.transactionHistory) walletData.transactionHistory = firebaseData.transactionHistory;
                    
                    if (firebaseData.userInfo && firebaseData.userInfo.referralBonusClaimed !== undefined) {
                        userData.referralBonusClaimed = firebaseData.userInfo.referralBonusClaimed;
                    }
                    
                    console.log("✅ Data loaded from Firebase");
                    
                    await loadPendingRequests();
                    cleanDuplicateTransactions();

                    await saveUserDataToFirebase();
                }
                
                saveUserDataToLocalStorage();
                
            } catch (error) {
                console.error("❌ Error loading from Firebase, falling back to localStorage:", error);
                showInfo('offline_mode');
                await loadUserFromLocalStorage();

                    const withdrawalSnapshot = await window.db.collection(DB_COLLECTIONS.WITHDRAWALS)

        function addTransactionToHistory(type, amount, currency, description = '', status = 'completed', message = '', txId = '') {
            const transactionId = 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            
            const transaction = {
                id: transactionId,
                type: type,
                amount: amount,
                currency: currency,
                description: description,
                status: status,
                message: message || getDefaultMessage(type, status),
                txId: txId,
                timestamp: Date.now(),
                dateFormatted: new Date().toLocaleDateString('en-US', {
                    year: 'numeric', month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit'
                })
            };
            
            if (!walletData.transactionHistory) walletData.transactionHistory = [];
            
            const isDuplicate = walletData.transactionHistory.some(tx => 
                tx.type === type && tx.amount === amount && tx.currency === currency && 
                Math.abs(tx.timestamp - transaction.timestamp) < 5000
            );
            
            if (!isDuplicate) {
                walletData.transactionHistory.unshift(transaction);
                if (walletData.transactionHistory.length > 100) {
                    walletData.transactionHistory = walletData.transactionHistory.slice(0, 100);
                }
                console.log(`📝 Transaction added to history: ${type} ${amount} ${currency} (${status})`);
            }
            
            return transaction;
        }

        function getDefaultMessage(type, status) {
            const messages = {
                'deposit_request': {
                    'pending': 'Deposit request submitted. Waiting for admin approval.',
                    'approved': 'Deposit approved and added to your balance.',
                    'rejected': 'Deposit rejected. Please check the transaction details.'
                },
                'withdrawal_request': {
                    'pending': 'Withdrawal request submitted. Processing...',
                    'approved': 'Withdrawal approved. Funds sent to your wallet.',
                    'rejected': 'Withdrawal rejected. Please check your wallet address.'
                },
                'mining_reward': { 'completed': 'Mining reward claimed successfully.' },
                'staking_start': { 'completed': 'Staking started successfully.' },
                'staking_reward': { 'completed': 'Staking reward claimed.' },
                'swap': { 'completed': 'Swap completed successfully.' },
                'referral_welcome': { 'completed': 'Welcome bonus for joining via referral.' },
                'referral_bonus': { 'completed': 'Referral bonus earned.' },
                'referral_milestone': { 'completed': 'Referral milestone reward claimed.' },
                'task_reward': { 'completed': 'Task completed successfully.' },
                'achievement_reward': { 'completed': 'Achievement reward claimed.' }
            };
            
            return messages[type]?.[status] || 'Transaction completed';
        }

        function addTransaction(type, amount, currency, description = '') {
            if (type.includes('_request')) {
                addTransactionToHistory(type, amount, currency, description, 'pending', 'Request submitted');
            } else {
                const transaction = {
                    id: 'tx_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9),
                    type: type,
                    amount: amount,
                    currency: currency,
                    description: description,
                    timestamp: Date.now(),
                    status: 'completed'
                };
                
                if (!walletData.transactions) walletData.transactions = [];
                walletData.transactions.unshift(transaction);
                if (walletData.transactions.length > 50) {
                    walletData.transactions = walletData.transactions.slice(0, 50);
                }
                
                addTransactionToHistory(type, amount, currency, description, 'completed', getDefaultMessage(type, 'completed'));
                console.log(`📝 Transaction added: ${type} ${amount} ${currency}`);
            }
        }

        function loadHistoryContent(tabType = 'all', filterType = 'all') {
            const historyContent = document.getElementById('historyContent');
            if (!historyContent) return;
            
            let transactions = [...(walletData.transactionHistory || [])];
            
            const pendingRequests = [
                ...(walletData.pendingDeposits || []).map(deposit => ({
                    id: deposit.id,
                    type: 'deposit_request',
                    amount: deposit.amount,
                    currency: deposit.currency,
                    description: `TX: ${deposit.txId?.slice(0, 10)}...`,
                    status: 'pending',
                    message: 'Waiting for admin approval',
                    timestamp: deposit.createdAt || Date.now(),
                    dateFormatted: deposit.createdAt ? new Date(deposit.createdAt).toLocaleDateString() : 'Just now'
                })),
                ...(walletData.pendingWithdrawals || []).map(withdrawal => ({
                    id: withdrawal.id,
                    type: 'withdrawal_request',
                    amount: -withdrawal.amount,
                    currency: withdrawal.currency,
                    description: `To: ${withdrawal.address?.slice(0, 10)}...`,
                    status: 'pending',
                    message: 'Processing withdrawal',
                    timestamp: withdrawal.createdAt || Date.now(),
                    dateFormatted: withdrawal.createdAt ? new Date(withdrawal.createdAt).toLocaleDateString() : 'Just now'
                }))
            ];
            
            transactions = [...pendingRequests, ...transactions];
            transactions.sort((a, b) => b.timestamp - a.timestamp);
            
            if (tabType === 'pending') {
                transactions = transactions.filter(tx => tx.status === 'pending');
            } else if (tabType === 'completed') {
                transactions = transactions.filter(tx => tx.status === 'completed' || tx.status === 'approved');
            } else if (tabType === 'rejected') {
                transactions = transactions.filter(tx => tx.status === 'rejected');
            }
            
            if (filterType !== 'all') {
                if (filterType === 'deposit') transactions = transactions.filter(tx => tx.type.includes('deposit'));
                else if (filterType === 'withdrawal') transactions = transactions.filter(tx => tx.type.includes('withdrawal'));
                else if (filterType === 'mining') transactions = transactions.filter(tx => tx.type.includes('mining'));
                else if (filterType === 'staking') transactions = transactions.filter(tx => tx.type.includes('staking'));
                else if (filterType === 'swap') transactions = transactions.filter(tx => tx.type.includes('swap'));
                else if (filterType === 'referral') transactions = transactions.filter(tx => tx.type.includes('referral') || tx.type.includes('milestone'));
                else if (filterType === 'task') transactions = transactions.filter(tx => tx.type.includes('task'));
                else if (filterType === 'achievement') transactions = transactions.filter(tx => tx.type.includes('achievement'));
            }
            
            if (transactions.length === 0) {
                historyContent.innerHTML = `
                    <div class="history-empty">
                        <i class="fas fa-history"></i>
                        <p>No Transactions Found</p>
                        <small>No transactions match your current filters</small>
                    </div>
                `;
                return;
            }
            
            let html = '<div class="history-list">';
            
            transactions.slice(0, 50).forEach(tx => {
                const amountColor = tx.amount > 0 ? 'positive' : 'negative';
                const amountSign = tx.amount > 0 ? '+' : '';
                const absAmount = Math.abs(tx.amount);
                
                let iconClass = 'swap';
                let icon = 'fa-exchange-alt';
                let typeText = 'Swap';
                
                if (tx.type.includes('mining')) { iconClass = 'mining'; icon = 'fa-microchip'; typeText = 'Mining'; }
                else if (tx.type.includes('staking')) { iconClass = 'staking'; icon = 'fa-gem'; typeText = 'Staking'; }
                else if (tx.type.includes('deposit')) { iconClass = 'deposit'; icon = 'fa-download'; typeText = 'Deposit'; }
                else if (tx.type.includes('withdrawal')) { iconClass = 'withdraw'; icon = 'fa-upload'; typeText = 'Withdrawal'; }
                else if (tx.type.includes('referral')) { iconClass = 'referral'; icon = 'fa-users'; typeText = 'Referral'; }
                else if (tx.type.includes('milestone')) { iconClass = 'milestone'; icon = 'fa-trophy'; typeText = 'Milestone'; }
                else if (tx.type.includes('task')) { iconClass = 'task'; icon = 'fa-tasks'; typeText = 'Task'; }
                else if (tx.type.includes('achievement')) { iconClass = 'milestone'; icon = 'fa-trophy'; typeText = 'Achievement'; }
                
                let statusClass = '';
                if (tx.status === 'pending') statusClass = 'pending';
                else if (tx.status === 'completed' || tx.status === 'approved') statusClass = 'completed';
                else if (tx.status === 'rejected') statusClass = 'rejected';
                else if (tx.status === 'processing') statusClass = 'processing';
                
                let displayAmount = `${amountSign}${absAmount.toLocaleString()} ${tx.currency}`;
                if (tx.currency === 'AMSK' && absAmount >= 1000) {
                    displayAmount = `${amountSign}${formatNumber(absAmount)} ${tx.currency}`;
                }
                
                html += `
                    <div class="history-card">
                        <div class="history-card-header">
                            <div class="history-card-icon ${iconClass}">
                                <i class="fas ${icon}"></i>
                            </div>
                            <div class="history-card-details">
                                <div class="history-card-title">
                                    <span class="history-card-type">${typeText}</span>
                                    <span class="history-card-amount ${amountColor}">${displayAmount}</span>
                                </div>
                                <div class="history-card-description">
                                    ${tx.description || ''}
                                    ${tx.message ? `<br><small>${tx.message}</small>` : ''}
                                </div>
                                <div class="history-card-footer">
                                    <span class="history-card-date">${tx.dateFormatted || new Date(tx.timestamp).toLocaleDateString()}</span>
                                    <span class="history-card-status ${statusClass}">${tx.status}</span>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            });
            
            html += '</div>';
            if (transactions.length > 50) {
                html += `<div style="text-align: center; padding: 10px; color: var(--quantum-text-light); font-size: 12px;">
                    Showing 50 of ${transactions.length} transactions
                </div>`;
            }
            
            historyContent.innerHTML = html;
        }

        // ============================================
        // MINING SYSTEM
        // ============================================
        function updateMiningDisplay() {
            if (!walletData.mining) return;
            
            const mining = walletData.mining;
            const level = CONFIG.MINING.LEVELS[mining.level] || CONFIG.MINING.LEVELS[1];
            
            if (elements.currentMiningLevel) elements.currentMiningLevel.textContent = mining.level;
            if (elements.currentHashrateDisplay) elements.currentHashrateDisplay.textContent = formatNumber(level.hashrate);
            
            updateMiningTimer();
            
            if (elements.nextRewardAmount) elements.nextRewardAmount.textContent = formatNumber(level.reward);
            if (elements.totalMined) elements.totalMined.textContent = formatNumber(mining.totalMined);
            if (elements.minedToday) elements.minedToday.textContent = formatNumber(mining.minedToday);
            
            updateUpgradeCards();
            updateMiningButton();
        }

        function updateMiningTimer() {
            if (!walletData.mining || !elements.miningTimerDisplay) return;
            
            const now = Date.now();
            const nextRewardTime = walletData.mining.nextReward;
            
            if (!nextRewardTime) {
                elements.miningTimerDisplay.textContent = "01:00:00";
                return;
            }
            
            const timeLeft = nextRewardTime - now;
            
            if (timeLeft <= 0) {
                elements.miningTimerDisplay.textContent = "READY!";
                elements.miningTimerDisplay.style.color = "#00ff88";
                
                if (elements.startMiningBtn) {
                    elements.startMiningBtn.innerHTML = '<i class="fas fa-gift"></i><span>Claim Reward</span>';
                    elements.startMiningBtn.classList.add('claim-mode');
                }
            } else {
                const hours = Math.floor(timeLeft / (1000 * 60 * 60));
                const minutes = Math.floor((timeLeft % (1000 * 60 * 60)) / (1000 * 60));
                const seconds = Math.floor((timeLeft % (1000 * 60)) / 1000);
                
                elements.miningTimerDisplay.textContent = 
                    `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                elements.miningTimerDisplay.style.color = "#ffffff";
                
                if (elements.startMiningBtn) {
                    elements.startMiningBtn.innerHTML = '<i class="fas fa-play"></i><span>Mining...</span>';
                    elements.startMiningBtn.classList.remove('claim-mode');
                }
            }
        }

        function updateMiningButton() {
            if (!elements.startMiningBtn) return;
            
            const mining = walletData.mining;
            const now = Date.now();
            
            if (!mining.active) {
                elements.startMiningBtn.innerHTML = '<i class="fas fa-play"></i><span>Start Mining</span>';
                elements.startMiningBtn.classList.remove('claim-mode');
                elements.startMiningBtn.disabled = false;
            } else if (mining.nextReward && now >= mining.nextReward) {
                elements.startMiningBtn.innerHTML = '<i class="fas fa-gift"></i><span>Claim Reward</span>';
                elements.startMiningBtn.classList.add('claim-mode');
                elements.startMiningBtn.disabled = false;
            } else {
                elements.startMiningBtn.innerHTML = '<i class="fas fa-play"></i><span>Mining...</span>';
                elements.startMiningBtn.classList.remove('claim-mode');
                elements.startMiningBtn.disabled = true;
            }
        }

        function updateUpgradeCards() {
            if (!elements.upgradeCardsContainer) return;
            
            const currentLevel = walletData.mining.level;
            const usdtBalance = walletData.balances.USDT || 0;

            let html = '';
            
            for (let level = 1; level <= 5; level++) {
                const levelData = CONFIG.MINING.LEVELS[level];
                if (!levelData) continue;
                
                const isActive = level === currentLevel;
                const isLocked = level > currentLevel;
                const canAfford = usdtBalance >= levelData.cost;
                
                let buttonText = '';
                let buttonClass = '';
                let disabled = false;

                if (isActive) {
                    buttonText = 'Active';
                    buttonClass = 'active-btn';
                    disabled = true;
                } else if (!isLocked) {
                    buttonText = 'Upgraded';
                    buttonClass = 'active-btn';
                    disabled = true;
                } else {
                    if (canAfford) {
                        buttonText = 'Upgrade';
                        buttonClass = '';
                        disabled = false;
                    } else {
                        buttonText = `${levelData.cost} USDT`;
                        buttonClass = '';
                        disabled = true;
                    }
                }

                html += `
                    <div class="upgrade-card ${isActive ? 'active' : ''}" data-level="${level}">
                        <div class="upgrade-header">
                            <span class="upgrade-level">Level ${level}</span>
                            <span class="upgrade-name">${levelData.name}</span>
                        </div>
                        <div class="upgrade-price-tag">💰 ${levelData.cost > 0 ? levelData.cost + ' USDT' : 'Free'}</div>
                        <div class="upgrade-stats">
                            <div class="upgrade-stat"><i class="fas fa-microchip"></i><span>${levelData.hashrate.toLocaleString()} Hash/s</span></div>
                            <div class="upgrade-stat"><i class="fas fa-gift"></i><span>${levelData.reward.toLocaleString()} AMSK/hour</span></div>
                            <div class="upgrade-stat roi"><i class="fas fa-chart-line"></i><span>ROI: ${levelData.apy}</span></div>
                        </div>
                        <button class="upgrade-btn ${buttonClass}" 
                                data-level="${level}" 
                                ${disabled ? 'disabled' : ''}
                                onclick="upgradeMiningLevel(${level})">
                            ${buttonText}
                        </button>
                    </div>
                `;
            }
            
            elements.upgradeCardsContainer.innerHTML = html;
        }

        function handleMiningAction() {
            if (!walletData.mining) return;
            
            const mining = walletData.mining;
            const now = Date.now();
            
            if (mining.active && mining.nextReward && now < mining.nextReward) {
                showWarning('mining_progress');
                return;
            }
            
            if (!mining.active) {
                startMining();
            } else if (mining.nextReward && now >= mining.nextReward) {
                claimMiningReward();
            }
        }

        async function startMining() {
            try {
                walletData.mining.active = true;
                walletData.mining.lastReward = Date.now();
                walletData.mining.nextReward = Date.now() + CONFIG.MINING.DURATION;
                
                updateMiningDisplay();
                await saveUserData();
                
                showSuccess('mining_start');
                
            } catch (error) {
                console.error("❌ Error starting mining:", error);
                showError('mining_failed');
            }
        }

        async function claimMiningReward() {
            try {
                const level = CONFIG.MINING.LEVELS[walletData.mining.level];
                let reward = level.reward;
                
                walletData.balances.AMSK = (walletData.balances.AMSK || 0) + reward;
                walletData.mining.totalMined = (walletData.mining.totalMined || 0) + reward;
                walletData.mining.minedToday = (walletData.mining.minedToday || 0) + reward;
                walletData.mining.lastReward = Date.now();
                walletData.mining.nextReward = Date.now() + CONFIG.MINING.DURATION;
                
                addTransactionToHistory('mining_reward', reward, 'AMSK', 'Mining reward', 'completed', 'Mining reward claimed successfully');
                
                updateMiningDisplay();
                updateWalletUI();
                await saveUserData();
                
                showSuccess('mining_claim', { amount: formatNumber(reward) });
                
            } catch (error) {
                console.error("❌ Error claiming mining reward:", error);
                showError('claim_failed');
            }
        }

        async function upgradeMiningLevel(level) {
            try {
                level = parseInt(level);
                const levelData = CONFIG.MINING.LEVELS[level];
                
                if (!levelData) throw new Error("Invalid mining level");
                if (level <= walletData.mining.level) {
                    showWarning('already_upgraded');
                    return;
                }
                
                if (walletData.balances.USDT < levelData.cost) {
                    showWarning('insufficient_usdt', { amount: levelData.cost });
                    return;
                }
                
                walletData.balances.USDT -= levelData.cost;
                walletData.mining.level = level;
                
                addTransactionToHistory('mining_upgrade', -levelData.cost, 'USDT', `Upgrade to ${levelData.name} level`, 'completed', 'Mining level upgraded');
                
                checkUpgradeAchievements(level);
                
                updateMiningDisplay();
                updateWalletUI();
                await saveUserData();
                
                showSuccess('upgrade_success', { 
                    name: levelData.name, 
                    hashrate: levelData.hashrate.toLocaleString() 
                });
                
            } catch (error) {
                console.error("❌ Error upgrading mining level:", error);
                showError('upgrade_failed');
            }
        }

        // ============================================
        // WALLET SYSTEM

        // ============================================
        // STAKING SYSTEM
        // ============================================
        function updateStakingDisplay() {
            updateStakingStats();
            updateActiveStakes();
        }

        function updateStakingStats() {
            if (elements.totalStaked) {
                elements.totalStaked.textContent = `${walletData.staking.totalStaked.toFixed(2)} USDT`;
            }
        }

        function updateActiveStakes() {
            if (!elements.activeStakesList) return;
            
            const activeStakes = walletData.staking.activeStakes || [];
            
            if (!activeStakes.length) {
                elements.activeStakesList.innerHTML = `
                    <div class="empty-stakes">
                        <i class="fas fa-inbox"></i>
                        <p>No active stakes yet</p>
                        <small>Start staking to earn rewards</small>
                    </div>
                `;
                return;
            }
            
            let html = '';
            activeStakes.forEach((stake, index) => {
                const plan = CONFIG.STAKING.PLANS[stake.planId];
                if (!plan) return;
                
                const now = Date.now();
                const startTime = stake.startTime || now;
                const durationMs = plan.duration * 24 * 60 * 60 * 1000;
                const endTime = startTime + durationMs;
                const progress = Math.min(((now - startTime) / durationMs) * 100, 100);
                const daysLeft = Math.ceil((endTime - now) / (24 * 60 * 60 * 1000));
                
                let dailyReward = 0, totalReward = 0;
                
                if (plan.name === "Silver") {
                    dailyReward = (stake.amount / 10) * plan.dailyPer10;
                    totalReward = (stake.amount / 10) * plan.totalPer10;
                } else if (plan.name === "Gold") {
                    dailyReward = (stake.amount / 50) * plan.dailyPer50;
                    totalReward = (stake.amount / 50) * plan.totalPer50;
                } else if (plan.name === "Diamond") {
                    dailyReward = (stake.amount / 100) * plan.dailyPer100;
                    totalReward = (stake.amount / 100) * plan.totalPer100;
                }
                
                html += `
                    <div class="stake-item">
                        <div class="stake-header">
                            <div class="stake-info">
                                <h5>${plan.name} - ${stake.amount} USDT</h5>
                                <span class="stake-duration">${plan.duration} Days</span>
                            </div>
                            <span class="status-badge active">Active</span>
                        </div>
                        
                        <div class="stake-progress">
                            <div class="progress-info">
                                <span>${Math.round(progress)}%</span>
                                <span>${daysLeft} days left</span>
                            </div>
                            <div class="progress-bar">
                                <div class="progress-fill" style="width: ${progress}%"></div>
                            </div>
                        </div>
                        
                        <div class="stake-details">
                            <div class="detail"><i class="fas fa-percentage"></i><span>${plan.apr}% APR</span></div>
                            <div class="detail"><i class="fas fa-gift"></i><span>${dailyReward.toLocaleString()} AMSK/Day</span></div>
                            <div class="detail"><i class="fas fa-coins"></i><span>Total: ${totalReward.toLocaleString()} AMSK</span></div>
                        </div>
                        
                        <div class="stake-actions">
                            <button class="btn-secondary" onclick="cancelStake(${index})" ${progress < 50 ? '' : 'disabled'}>
                                Cancel (50% penalty)
                            </button>
                            <button class="btn-primary" onclick="claimStakeReward(${index})" ${progress >= 100 ? '' : 'disabled'}>
                                Claim
                            </button>
                        </div>
                    </div>
                `;
            });
            
            elements.activeStakesList.innerHTML = html;
        }

        function openStakeModal(planId) {
            const plan = CONFIG.STAKING.PLANS[planId];
            if (!plan) return;
            
            const usdtBalance = walletData.balances.USDT || 0;
            const maxAmount = Math.max(plan.minAmount, Math.min(usdtBalance, plan.minAmount * 10));
            const initialAmount = Math.max(plan.minAmount, Math.min(plan.minAmount * 2, maxAmount));
            
            const modalContent = `
                <div class="modal-overlay active" onclick="closeModal()">
                    <div class="modal active" onclick="event.stopPropagation()">
                        <div class="modal-header">
                            <h3><i class="fas fa-gem"></i> ${plan.name} Staking</h3>
                            <button class="modal-close" onclick="closeModal()">×</button>
                        </div>
                        <div class="modal-body">
                            <div class="stake-plan-info">
                                <div class="plan-icon"><i class="fas fa-gem"></i></div>
                                <div class="plan-details">
                                    <h4>${plan.name} Plan</h4>
                                    <div class="plan-apr">${plan.apr}% APR</div>
                                    <div class="plan-duration">${plan.duration} Days</div>
                                </div>
                            </div>
                            
                            <div class="stake-amount-section">
                                <div class="amount-header">
                                    <span>Staking Amount (USDT)</span>
                                    <span class="balance">Balance: ${usdtBalance.toFixed(2)} USDT</span>
                                </div>
                                <div class="amount-input-group">
                                    <input type="number" id="stakeAmount" class="amount-input"
                                           value="${initialAmount.toFixed(2)}" min="${plan.minAmount}"
                                           max="${maxAmount}" step="0.01" oninput="calculateStakeReward(${planId})">
                                    <button class="max-btn" onclick="setMaxStakeAmount(${planId})">MAX</button>
                                </div>
                                <div class="amount-range">
                                    <input type="range" id="stakeSlider" min="${plan.minAmount}" 
                                           max="${maxAmount}" value="${initialAmount}" step="1"
                                           oninput="updateStakeAmountFromSlider(${planId})">
                                    <div class="range-labels">
                                        <span>${plan.minAmount} USDT</span>
                                        <span>${maxAmount.toFixed(0)} USDT</span>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="stake-reward-calculation">
                                <div class="reward-header"><i class="fas fa-calculator"></i><span>Reward Calculation</span></div>
                                <div class="reward-details">
                                    <div class="reward-item"><span>Daily Reward:</span><span id="dailyReward">0 AMSK</span></div>
                                    <div class="reward-item"><span>Total Reward (${plan.duration} days):</span><span id="totalReward">0 AMSK</span></div>
                                    <div class="reward-item"><span>APR:</span><span>${plan.apr}%</span></div>
                                    <div class="reward-item total"><span>Total Return:</span><span id="totalReturn">0 AMSK</span></div>
                                </div>
                            </div>
                            
                            <div class="modal-actions">
                                <button class="btn-secondary" onclick="closeModal()">Cancel</button>
                                <button class="btn-primary" id="confirmStakeBtn" onclick="confirmStaking(${planId})" 
                                        ${usdtBalance >= plan.minAmount ? '' : 'disabled'}>Confirm Stake</button>
                            </div>
                        </div>
                    </div>
                </div>
            `;
            
            document.querySelectorAll('.modal-overlay').forEach(el => el.remove());
            document.body.insertAdjacentHTML('beforeend', modalContent);
            
            setTimeout(() => calculateStakeReward(planId), 100);
        }

        function calculateStakeReward(planId) {
            const plan = CONFIG.STAKING.PLANS[planId];
            const amountInput = document.getElementById('stakeAmount');
            const slider = document.getElementById('stakeSlider');
            const confirmBtn = document.getElementById('confirmStakeBtn');
            
            if (!amountInput || !plan) return;
            
            const amount = parseFloat(amountInput.value) || 0;
            const usdtBalance = walletData.balances.USDT || 0;
            
            if (slider) slider.value = amount;
            
            let dailyReward = 0, totalReward = 0;
            
            if (plan.name === "Silver") {
                dailyReward = (amount / 10) * plan.dailyPer10;
                totalReward = (amount / 10) * plan.totalPer10;
            } else if (plan.name === "Gold") {
                dailyReward = (amount / 50) * plan.dailyPer50;
                totalReward = (amount / 50) * plan.totalPer50;
            } else if (plan.name === "Diamond") {
                dailyReward = (amount / 100) * plan.dailyPer100;
                totalReward = (amount / 100) * plan.totalPer100;
            }
            
            if (document.getElementById('dailyReward')) {
                document.getElementById('dailyReward').textContent = `${dailyReward.toLocaleString()} AMSK`;
            }
            if (document.getElementById('totalReward')) {
                document.getElementById('totalReward').textContent = `${totalReward.toLocaleString()} AMSK`;
            }
            if (document.getElementById('totalReturn')) {
                const usdValue = (totalReward * CONFIG.PRICES.AMSK).toFixed(2);
                document.getElementById('totalReturn').textContent = `${totalReward.toLocaleString()} AMSK (≈ $${usdValue})`;
            }
            
            if (confirmBtn) confirmBtn.disabled = (amount < plan.minAmount || amount > usdtBalance);
        }

        function setMaxStakeAmount(planId) {
            const plan = CONFIG.STAKING.PLANS[planId];
            const amountInput = document.getElementById('stakeAmount');
            const slider = document.getElementById('stakeSlider');
            
            if (!amountInput || !plan) return;
            
            const usdtBalance = walletData.balances.USDT || 0;
            const maxAmount = Math.max(plan.minAmount, Math.min(usdtBalance, plan.minAmount * 10));
            
            amountInput.value = maxAmount.toFixed(2);
            if (slider) slider.value = maxAmount;
            
            calculateStakeReward(planId);
        }

        function updateStakeAmountFromSlider(planId) {
            const slider = document.getElementById('stakeSlider');
            const amountInput = document.getElementById('stakeAmount');
            
            if (slider && amountInput) {
                amountInput.value = parseFloat(slider.value).toFixed(2);
                calculateStakeReward(planId);
            }
        }

        async function confirmStaking(planId) {
            try {
                const plan = CONFIG.STAKING.PLANS[planId];
                if (!plan) throw new Error("Plan not found");
                
                const amountInput = document.getElementById('stakeAmount');
                if (!amountInput) return;
                
                const amount = parseFloat(amountInput.value);
                
                if (isNaN(amount) || amount < plan.minAmount) {
                    showError('invalid_input');
                    return;
                }
                
                if (walletData.balances.USDT < amount) {
                    showWarning('insufficient_stake', { amount: (amount - walletData.balances.USDT).toFixed(2) });
                    return;
                }
                
                walletData.balances.USDT -= amount;
                
                const stake = {
                    planId: planId,
                    amount: amount,
                    startTime: Date.now(),
                    duration: plan.duration,
                    claimed: false
                };
                
                if (!walletData.staking.activeStakes) walletData.staking.activeStakes = [];
                walletData.staking.activeStakes.push(stake);
                walletData.staking.totalStaked = (walletData.staking.totalStaked || 0) + amount;
                
                addTransactionToHistory('staking_start', -amount, 'USDT', `${plan.name} Plan - ${plan.duration} days`, 'completed', 'Staking started successfully');
                
                checkStakingAchievement(planId, amount);
                
                updateWalletUI();
                updateStakingDisplay();
                
                closeModal();
                showSuccess('stake_success', { amount: amount, days: plan.duration });
                await saveUserData();
                
            } catch (error) {
                console.error("❌ Error confirming stake:", error);
                showError('stake_failed');
            }
        }

        async function claimStakeReward(stakeIndex) {
            try {
                const activeStakes = walletData.staking.activeStakes || [];
                const stake = activeStakes[stakeIndex];
                if (!stake) throw new Error("Stake not found");
                
                const plan = CONFIG.STAKING.PLANS[stake.planId];
                if (!plan) throw new Error("Plan not found");
                
                const now = Date.now();
                const endTime = stake.startTime + (plan.duration * 24 * 60 * 60 * 1000);
                
                if (now < endTime) {
                    showWarning('stake_period');
                    return;
                }
                
                let totalReward = 0;
                
                if (plan.name === "Silver") totalReward = (stake.amount / 10) * plan.totalPer10;
                else if (plan.name === "Gold") totalReward = (stake.amount / 50) * plan.totalPer50;
                else if (plan.name === "Diamond") totalReward = (stake.amount / 100) * plan.totalPer100;
                
                walletData.balances.AMSK += totalReward;
                walletData.balances.USDT += stake.amount;
                
                walletData.staking.totalEarned = (walletData.staking.totalEarned || 0) + totalReward;
                walletData.staking.totalStaked -= stake.amount;
                
                addTransactionToHistory('staking_reward', totalReward, 'AMSK', `${plan.name} Plan reward`, 'completed', 'Staking reward claimed');
                addTransactionToHistory('staking_return', stake.amount, 'USDT', 'Principal returned', 'completed', 'Staking principal returned');
                
                activeStakes.splice(stakeIndex, 1);
                
                updateWalletUI();
                updateStakingDisplay();
                
                showSuccess('stake_claim', { amount: totalReward.toLocaleString(), plan: plan.name });
                await saveUserData();
                
            } catch (error) {
                console.error("❌ Error claiming stake reward:", error);
                showError('stake_claim_failed');
            }
        }

        async function cancelStake(stakeIndex) {
            const activeStakes = walletData.staking.activeStakes || [];
            const stake = activeStakes[stakeIndex];
            
            if (!stake) return;
            
            const plan = CONFIG.STAKING.PLANS[stake.planId];
            if (!plan) return;
            
            const now = Date.now();
            const startTime = stake.startTime || now;
            const durationMs = plan.duration * 24 * 60 * 60 * 1000;
            const progress = ((now - startTime) / durationMs) * 100;
            
            if (progress >= 50) {
                showWarning('stake_cancel');
                return;
            }
            
            const returnedAmount = stake.amount * 0.5;
            walletData.balances.USDT += returnedAmount;
            walletData.staking.totalStaked -= stake.amount;
            
            addTransactionToHistory('staking_cancel', returnedAmount, 'USDT', 'Staking cancelled (50% penalty)', 'completed', 'Staking cancelled with penalty');
            
            activeStakes.splice(stakeIndex, 1);
            
            updateWalletUI();
            updateStakingDisplay();
            
            showWarning('stake_canceled', { amount: returnedAmount.toFixed(2) });
            await saveUserData();
        }
